name: Veritas CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Python compile
        run: python -m py_compile server.py smoke_tests.py ingest_to_splunk.py

      - name: JavaScript syntax check
        run: |
          node --check app.js
          node --check detail.js

      - name: Mock-mode smoke tests
        env:
          PORT: "5173"
          VERITAS_BASE_URL: http://127.0.0.1:5173
          VERITAS_REQUEST_TIMEOUT: "30"
          SPLUNK_HOST: ""
          SPLUNK_TOKEN: ""
        run: |
          set -euo pipefail
          python server.py > server.log 2>&1 &
          SERVER_PID=$!

          cleanup() {
            status=$?
            kill "$SERVER_PID" 2>/dev/null || true
            if [ "$status" -ne 0 ]; then
              echo "::group::server.log"
              cat server.log || true
              echo "::endgroup::"
            fi
            exit "$status"
          }
          trap cleanup EXIT

          python - <<'PY'
          import json
          import time
          from urllib import request

          deadline = time.time() + 20
          while time.time() < deadline:
              try:
                  with request.urlopen("http://127.0.0.1:5173/api/health", timeout=2) as response:
                      payload = json.loads(response.read().decode("utf-8"))
                  if payload.get("ok") and payload.get("mode") == "mock-mcp":
                      raise SystemExit(0)
              except Exception:
                  time.sleep(0.5)

          raise SystemExit("Veritas mock server did not become healthy")
          PY

          python smoke_tests.py
